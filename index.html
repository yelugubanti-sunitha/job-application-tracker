<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOB TRACKER</title>
    <title>Job Application Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
  <div class="container">
    <a class="navbar-brand" href="#">Job Application Tracker</a>

    <button id="darkModeToggle" class="btn btn-sm btn-outline-light ms-auto">
      Dark Mode
    </button>

  </div>
</nav>


<div class="container mt-4">

<div class="row text-center g-3">

<div class="col-md">
<div class="card bg-light shadow-sm">
<div class="card-body">
<h6>📊 Total Applications</h6>
<h3 id="totalCount">0</h3>
</div>
</div>
</div>

<div class="col-md">
<div class="card p-3">
<h6>🟡 Applied</h6>
<h3 id="appliedCount">0</h3>

<div class="progress">
<div id="appliedBar" class="progress-bar bg-warning" style="width:0%"></div>
</div>
</div>
</div>

<div class="col-md">
<div class="card p-3">
<h6>🔵 Interview</h6>
<h3 id="interviewCount">0</h3>

<div class="progress">
<div id="interviewBar" class="progress-bar bg-info" style="width:0%"></div>
</div>
</div>
</div>

<div class="col-md">
<div class="card p-3">
<h6>🟢 Selected</h6>
<h3 id="selectedCount">0</h3>

<div class="progress">
<div id="selectedBar" class="progress-bar bg-success" style="width:0%"></div>
</div>
</div>
</div>

<div class="col-md">
<div class="card p-3">
<h6>🔴 Rejected</h6>
<h3 id="rejectedCount">0</h3>

<div class="progress">
<div id="rejectedBar" class="progress-bar bg-danger" style="width:0%"></div>
</div>
</div>
</div>

</div>

</div>
<div class="container mt-4">

<div class="card shadow-sm">

<div class="card-body">

<h4 class="mb-3">Application Analytics</h4>

<div class="d-flex justify-content-center">
<canvas id="statusChart" style="max-width:400px;"></canvas>
</div>

</div>

</div>

</div>
  
  <div class="container mt-4">

<div class="card shadow-sm">
<div class="card-body">

<h4 class="mb-3"> Add New Job</h4>

<form id="jobForm" class="row g-3">

<div class="col-md-4">
<input type="text" id="company" class="form-control" placeholder="Company Name" required>
</div>

<div class="col-md-4">
<input type="text" id="role" class="form-control" placeholder="Job Role" required>
</div>

<div class="col-md-4">
<select id="status" class="form-select">
<option value="Applied">Applied</option>
<option value="Interview">Interview</option>
<option value="Rejected">Rejected</option>
<option value="Selected">Selected</option>
</select>
</div>

<div class="col-md-6">
<input type="file" id="resume" class="form-control" accept=".pdf,.doc,.docx">
</div>

<div class="col-md-6">
<button type="submit" class="btn btn-secondary w-100">
➕ Add Job
</button>
</div>

</form>

</div>
</div>

</div>

  
  <div class="container mt-4">

<div class="card shadow-sm">
<div class="card-body">

<div class="d-flex justify-content-between align-items-center mb-3">

<h4>Applications</h4>

<div>
<button id="exportBtn" class="btn btn-outline-secondary btn-sm me-2">
Export CSV
</button>

<button id="clearAllBtn" class="btn btn-outline-danger btn-sm">
Clear All
</button>
</div>

</div>

<input 
type="text" 
id="searchInput" 
class="form-control mb-3"
placeholder="Search by company or role..."
>
<div class="mb-3">

<button class="btn btn-outline-primary filter-btn" data-status="All">
All
</button>

<button class="btn btn-outline-primary filter-btn" data-status="Applied">
Applied
</button>

<button class="btn btn-outline-primary filter-btn" data-status="Interview">
Interview
</button>

<button class="btn btn-outline-primary filter-btn" data-status="Rejected">
Rejected
</button>

<button class="btn btn-outline-primary filter-btn" data-status="Selected">
Selected
</button>

</div>
<div class="table-responsive">
<table class="table table-bordered table-striped">
<thead class="table-light">
<tr>
<th>Company</th>
<th>Role</th>
<th>Status</th>
<th>Resume</th>
<th>Date</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="jobContainer"></tbody>
</table>
</div>

<p id="emptyMessage" class="text-center text-muted mt-3">
No job applications added yet. Start by adding your first application.
</p>

</tbody>

</table>

</div>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
